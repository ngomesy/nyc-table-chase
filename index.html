<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy-esque</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Flappy-esque</h1>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
      </div>
      <canvas id="game" width="420" height="640" aria-label="Flappy game canvas"></canvas>
      <p id="status" class="status">Press Space / Click to start</p>
      <p class="hint">Controls: Space, Arrow Up, Click or Tap</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
